<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Мониторинг ЮВАО{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  </head>
  <body>
    {% if user %}
      <nav class="container">
        <ul>
          <li><strong>Мониторинг ЮВАО</strong></li>
        </ul>
        <ul>
          <li><a href="/">Отчёты</a></li>
          <li><a href="/admin/networks">Сетки</a></li>
          {% if user.role.value == "admin" %}
            <li><a href="/admin/users">Пользователи</a></li>
          {% endif %}
          <li class="muted">{{ user.display_name }}</li>
          <li>
            <form action="/logout" method="post">
              <button type="submit" class="secondary">Выйти</button>
            </form>
          </li>
        </ul>
      </nav>
    {% endif %}
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
