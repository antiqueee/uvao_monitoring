{% extends "base.html" %}
{% block title %}Сетки{% endblock %}
{% block content %}
  <h1 style="margin-bottom: 6px;">Сетки</h1>
  <div class="page-meta">{{ networks|length }} районов ЮВАО</div>

  <div>
    {% for network in networks %}
      <a class="list-row" href="/admin/networks/{{ network.id }}">
        <div>
          <div class="list-title">{{ network.name }}</div>
          <div class="muted2" style="margin-top: 2px;">{{ network.resources|length }} ресурсов</div>
        </div>
        <i class="ti ti-chevron-right" aria-hidden="true"></i>
      </a>
    {% else %}
      <div class="empty">Сеток пока нет</div>
    {% endfor %}
  </div>
{% endblock %}
